// ── BRING LIST ───────────────────────────────────────────────

window.renderBring = function() {
  const el = document.getElementById('bringList');
  if (!el) return;
  const docs = window._bringDocs.filter(x => !x.deleted);
  if (!docs.length) {
    el.innerHTML = `<div class="empty-state">${escHtml(t('bring_empty')).replace('\n','<br>')}</div>`;
    return;
  }
  const unpacked = docs.filter(x => !x.packed);
  const packed   = docs.filter(x => x.packed);

  let html = '';
  unpacked.forEach(item => {
    html += bringItemHTML(item);
  });
  if (packed.length) {
    html += `<div class="done-divider"><div class="done-divider-line"></div>
      <div class="done-divider-label">${t('bring_packed')} (${packed.length})</div>
      <div class="done-divider-line"></div></div>`;
    packed.forEach(item => { html += bringItemHTML(item); });
  }
  el.innerHTML = html;

  // Re-apply i18n to bring input/button
  const inp = document.getElementById('bringInput');
  if (inp) inp.placeholder = t('bring_input_placeholder');
  const btn = el.closest('.view')?.querySelector('[data-i18n-btn="btn_bring_add"]');
  if (btn) btn.textContent = t('btn_bring_add');
};

function bringItemHTML(item) {
  const cls = item.packed ? 'bring-item packed' : 'bring-item';
  const check = item.packed ? '✓' : '';
  return `<div class="${cls}" onclick="bringToggle('${item.id}')">
    <div class="bring-check-zone">${check}</div>
    <div class="bring-item-text">${escHtml(item.text)}</div>
    <button class="bring-delete" onclick="event.stopPropagation();bringDelete('${item.id}')" title="Delete">✕</button>
  </div>`;
}

async function bringAdd() {
  const inp = document.getElementById('bringInput');
  const text = inp?.value.trim();
  if (!text) return;
  const fb = window._fb;
  if (!fb) { showToast('Firebase not ready'); return; }
  try {
    await fb.addDoc(fb.collection(fb.db, 'bringlist'), {
      text,
      packed: false,
      createdAt: fb.serverTimestamp(),
      addedBy: 'user'
    });
    inp.value = '';
  } catch(e) { showToast('Error: ' + e.message); }
}
window.bringAdd = bringAdd;

async function bringToggle(id) {
  const fb = window._fb;
  if (!fb) return;
  const item = window._bringDocs.find(x => x.id === id);
  if (!item) return;
  try {
    await fb.updateDoc(fb.doc(fb.db, 'bringlist', id), { packed: !item.packed });
  } catch(e) { console.error(e); }
}
window.bringToggle = bringToggle;

async function bringDelete(id) {
  const fb = window._fb;
  if (!fb) return;
  try {
    // Soft delete: mark as deleted (Firestore free tier — avoid delete ops)
    await fb.updateDoc(fb.doc(fb.db, 'bringlist', id), { deleted: true, packed: true });
    // Filter out from local cache immediately
    window._bringDocs = window._bringDocs.filter(x => x.id !== id || !x.deleted);
    window.renderBring();
  } catch(e) { console.error(e); }
}
window.bringDelete = bringDelete;

// ── SHARED LEDGER ────────────────────────────────────────────

window.renderLedger = function() {
  const el = document.getElementById('ledgerList');
  const summaryEl = document.getElementById('ledgerSummary');
  if (!el) return;

  const docs     = window._ledgerDocs.filter(x => !x.deleted);
  const active   = docs.filter(x => !x.settled);
  const archived = docs.filter(x =>  x.settled);

  // Balance — Da always paid, Maciek always owes
  const balance = active.reduce((s, x) => s + (x.amount || 0), 0);

  if (summaryEl) {
    if (balance > 0.01) {
      summaryEl.textContent = `MACIEK OWES DA $${balance.toFixed(2)}`;
      summaryEl.style.background = 'var(--black)';
    } else {
      summaryEl.textContent = 'ALL SETTLED ✓';
      summaryEl.style.background = 'var(--green,#00C853)';
    }
  }

  if (!docs.length) {
    el.innerHTML = `<div class="empty-state">${escHtml(t('ledger_empty')).replace('\n','<br>')}</div>`;
    return;
  }

  function itemHTML(item, isArchive) {
    const added = item.createdAt?.toDate
      ? item.createdAt.toDate().toLocaleDateString('en-CA', { month:'short', day:'numeric' }).toUpperCase()
      : '';
    const settledDate = item.settledAt
      ? new Date(item.settledAt).toLocaleDateString('en-CA', { month:'short', day:'numeric' }).toUpperCase()
      : '';
    const meta = isArchive
      ? `Da paid · ${added}  ·  ✓ SETTLED ${settledDate}`
      : `Da paid · ${added}`;
    const actionBtn = isArchive
      ? `<button class="ledger-settle-btn" style="background:#e53935;color:#fff;border-color:#e53935;" onclick="ledgerDelete('${item.id}')">🗑️</button>`
      : `<button class="ledger-settle-btn" onclick="ledgerSettle('${item.id}')">${t('ledger_settle')}</button>`;
    return `<div class="ledger-item${isArchive ? ' settled' : ''}">
      <div class="ledger-item-info">
        <span class="ledger-item-desc">${escHtml(item.desc)}</span>
        <span class="ledger-item-meta">${meta}</span>
      </div>
      <div class="ledger-item-amount">$${Number(item.amount).toFixed(2)}</div>
      ${actionBtn}
    </div>`;
  }

  let html = active.map(i => itemHTML(i, false)).join('');

  if (archived.length) {
    html += `<div class="done-divider" style="margin:18px 0 12px;">
      <div class="done-divider-line"></div>
      <div class="done-divider-label">SETTLED ARCHIVE (${archived.length})</div>
      <div class="done-divider-line"></div>
    </div>`;
    html += archived.map(i => itemHTML(i, true)).join('');
  }

  el.innerHTML = html;

  // Re-apply i18n
  const descInp = document.getElementById('ledgerDesc');
  if (descInp) descInp.placeholder = t('ledger_desc_placeholder');
  const addBtn = el.closest('.view')?.querySelector('[data-i18n-btn="btn_ledger_add"]');
  if (addBtn) addBtn.textContent = t('btn_ledger_add');
};

async function ledgerAdd() {
  const desc   = document.getElementById('ledgerDesc')?.value.trim();
  const amount = parseFloat(document.getElementById('ledgerAmount')?.value);
  if (!desc)                        { showToast('ADD A DESCRIPTION'); return; }
  if (isNaN(amount) || amount <= 0) { showToast('ADD AN AMOUNT'); return; }
  // Da always paid — Maciek always owes. Simple.
  const paidBy = 'him';
  const fb = window._fb;
  if (!fb) { showToast('FIREBASE NOT READY'); return; }
  try {
    await fb.addDoc(fb.collection(fb.db, 'ledger'), {
      desc, amount, paidBy,
      settled: false,
      deleted: false,
      createdAt: fb.serverTimestamp()
    });
    document.getElementById('ledgerDesc').value   = '';
    document.getElementById('ledgerAmount').value = '';

  } catch(e) { showToast('ERROR: ' + e.message); }
}

async function ledgerSettle(id) {

}

async function ledgerDelete(id) {
  const fb = window._fb;
  if (!fb) { showToast('NOT CONNECTED'); return; }
  try {
    await fb.updateDoc(fb.doc(fb.db, 'ledger', id), { deleted: true });
    showToast('🗑️ DELETED');
  } catch(e) { showToast('ERROR: ' + e.message); }
}
window.ledgerDelete = ledgerDelete;

// ── CUBEACR IMPORT ───────────────────────────────────────────

const CUBE_DB_NAME = 'dadapp_cube';
const CUBE_DB_KEY  = 'dirHandle';
const CUBE_SEEN_KEY = 'dadapp_cube_seen'; // localStorage: Set of already-imported filenames

function cubeSetStatus(msg) {
  const el = document.getElementById('cubeStatus');
  if (el) el.textContent = msg;
}

// Open (or create) a tiny IndexedDB to persist the directory handle
function cubeOpenDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(CUBE_DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('handles');
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}

async function cubeSaveHandle(handle) {
  const db = await cubeOpenDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(handle, CUBE_DB_KEY);
    tx.oncomplete = res;
    tx.onerror    = e => rej(e.target.error);
  });
}

async function cubeLoadHandle() {
  const db = await cubeOpenDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('handles', 'readonly');
    const req = tx.objectStore('handles').get(CUBE_DB_KEY);
    req.onsuccess = e => res(e.target.result || null);
    req.onerror   = e => rej(e.target.error);
  });
}

async function cubePickFolder() {
  if (!window.showDirectoryPicker) {
    showToast('NOT SUPPORTED IN THIS BROWSER');
    return;
  }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'read' });
    await cubeSaveHandle(handle);
    cubeSetStatus('✓ Folder saved: ' + handle.name);
    showToast('FOLDER SAVED — TAP IMPORT');
  } catch(e) {
    if (e.name !== 'AbortError') cubeSetStatus('Error: ' + e.message);
  }
}

async function cubeImport() {
  if (!window.showDirectoryPicker) {
    showToast('NOT SUPPORTED IN THIS BROWSER');
    return;
  }
  let handle;
  try {
    handle = await cubeLoadHandle();
  } catch(e) { /* ignore */ }

  if (!handle) {
    showToast('PICK A FOLDER FIRST');
    return;
  }

  // Re-verify permission (required after page reload)
  try {
    const perm = await handle.requestPermission({ mode: 'read' });
    if (perm !== 'granted') { cubeSetStatus('Permission denied'); return; }
  } catch(e) { cubeSetStatus('Permission error: ' + e.message); return; }

  const seen = new Set(JSON.parse(localStorage.getItem(CUBE_SEEN_KEY) || '[]'));
  const audioExts = ['.m4a', '.mp3', '.aac', '.ogg', '.wav', '.opus', '.webm'];
  let imported = 0;

  cubeSetStatus('Scanning...');
  try {
    for await (const [name, fileHandle] of handle.entries()) {
      if (fileHandle.kind !== 'file') continue;
      const lower = name.toLowerCase();
      if (!audioExts.some(ext => lower.endsWith(ext))) continue;
      if (seen.has(name)) continue;

      const file = await fileHandle.getFile();
      const dataUrl = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.onerror = rej;
        r.readAsDataURL(file);
      });

      const now = new Date(file.lastModified || Date.now());
      const dateStr = now.toLocaleDateString('en-CA', { month:'short', day:'numeric', year:'numeric' }).toUpperCase();
      const timeStr = now.toLocaleTimeString('en-CA', { hour:'2-digit', minute:'2-digit' });

      state.notes.unshift({
        id: Date.now() + imported,
        title: `📞 ${name.replace(/\.[^.]+$/,'')}`,
        body: `[CubeACR recording · ${dateStr} ${timeStr}]`,
        audioUrl:  dataUrl,
        audioWebm: dataUrl,
        done: false,
        lang: uiLang,
        date: dateStr,
        cubeFile: name,
      });

      seen.add(name);
      imported++;
    }
  } catch(e) {
    cubeSetStatus('Scan error: ' + e.message);
    return;
  }

  if (imported > 0) {
    localStorage.setItem(CUBE_SEEN_KEY, JSON.stringify([...seen]));
    save();
    renderNotes();
    cubeSetStatus(`✓ ${imported} recording${imported > 1 ? 's' : ''} imported`);
    showToast(`✓ ${imported} RECORDING${imported > 1 ? 'S' : ''} IMPORTED`);
    // Switch to notes tab to show them
    switchView('notes', document.querySelector('[data-view="notes"]'));
  } else {
    cubeSetStatus('No new recordings found');
    showToast('NO NEW RECORDINGS');
  }
}

window.cubePickFolder = cubePickFolder;
window.cubeImport     = cubeImport;
