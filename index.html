<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dad App">
<meta name="theme-color" content="#FFD600">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>DAD APP</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── DEFAULT THEME (Yellow) ── */
  :root {
    --yellow: #FFD600;
    --black: #000000;
    --white: #FFFFFF;
    --blue: #2F35E1;
    --pink: #FF6B9D;
    --grey: #E0E0E0;
    --green: #00C853;
    --shadow: 4px 4px 0px #000000;
    --border: 3px solid #000000;
    --font: 'Space Mono', 'Courier New', monospace;

    /* Semantic theme tokens */
    --bg:        var(--yellow);
    --bg-card:   var(--white);
    --text:      var(--black);
    --text-dim:  rgba(0,0,0,0.45);
    --text-muted:#555;
    --accent:    var(--blue);
    --nav-bg:    var(--black);
    --nav-text:  #888;
    --nav-active:var(--yellow);
    --input-bg:  var(--white);

    /* Font scale — changed by big-mode toggle */
    --fs-xs:  9px;
    --fs-sm:  11px;
    --fs-md:  13px;
    --fs-lg:  15px;
    --fs-xl:  18px;
    --fs-2xl: 20px;
    --fs-3xl: 28px;
    --fs-nav: 10px;
  }

  /* ── WARM PAPER THEME (Cream/Brown) ── */
  [data-theme="warm"] {
    --yellow: #FFF8E7;
    --black:  #3E2723;
    --white:  #FFFDF7;
    --blue:   #E65100;
    --grey:   #EFEBE9;
    --green:  #558B2F;
    --shadow: 4px 4px 0px #3E2723;
    --border: 3px solid #3E2723;

    --bg:        #FFF8E7;
    --bg-card:   #FFFDF7;
    --text:      #3E2723;
    --text-dim:  rgba(62,39,35,0.5);
    --text-muted:#795548;
    --accent:    #E65100;
    --nav-bg:    #3E2723;
    --nav-text:  #A1887F;
    --nav-active:#FFD54F;
    --input-bg:  #FFFDF7;
  }

  [data-theme="bw"] {
    --yellow: #FFFFFF;
    --black:  #000000;
    --white:  #FFFFFF;
    --blue:   #000000;
    --grey:   #E0E0E0;
    --green:  #000000;
    --shadow: 4px 4px 0px #000000;
    --border: 3px solid #000000;

    --bg:        #FFFFFF;
    --bg-card:   #FFFFFF;
    --text:      #000000;
    --text-dim:  rgba(0,0,0,0.4);
    --text-muted:#444444;
    --accent:    #000000;
    --nav-bg:    #000000;
    --nav-text:  #888888;
    --nav-active:#FFFFFF;
    --input-bg:  #FFFFFF;
  }

  /* B&W theme: accent buttons go black/white instead of blue/pink */
  [data-theme="bw"] .btn-blue  { background: #000; color: #fff; }
  [data-theme="bw"] .btn-pink  { background: #333; color: #fff; }
  [data-theme="bw"] .btn-green { background: #000; color: #fff; }
  [data-theme="bw"] .ledger-summary { background: #000; color: #fff; }
  [data-theme="bw"] .store-call-btn { background: #000; color: #fff; }
  [data-theme="bw"] .store-hours-badge.open { background: #000; color: #fff; }
  [data-theme="bw"] .store-hours-badge.closed { background: #e0e0e0; color: #000; }
  [data-theme="bw"] .notes-tab.active { background: #000; color: #fff; }
  [data-theme="bw"] .ledger-settle-btn { background: #000; color: #fff; }
  [data-theme="bw"] .tts-read-all-btn { background: #000; color: #fff; }

  /* ── BIG MODE overrides ── */
  [data-big="1"] {
    --fs-xs:  14px;
    --fs-sm:  17px;
    --fs-md:  20px;
    --fs-lg:  24px;
    --fs-xl:  28px;
    --fs-2xl: 34px;
    --fs-3xl: 44px;
    --fs-nav: 13px;
  }
  [data-big="1"] .nav-icon { font-size: 30px !important; }
  [data-big="1"] .nav-btn  { padding: 14px 4px 18px !important; min-height: 80px; gap: 6px; }
  [data-big="1"] .list-item { min-height: 100px; }
  [data-big="1"] .item-check-zone { min-height: 100px; width: 90px; }
  [data-big="1"] .item-check { width: 36px; height: 36px; font-size: 20px; }
  [data-big="1"] .item-label { font-size: 20px !important; letter-spacing: 0.04em; }
  [data-big="1"] .btn { font-size: 17px !important; padding: 18px 20px !important; min-height: 64px; }
  [data-big="1"] .note-item { padding: 18px 16px !important; }
  [data-big="1"] .note-title { font-size: 18px !important; }
  [data-big="1"] .store-name { font-size: 22px !important; }
  [data-big="1"] .store-address { font-size: 13px !important; }
  [data-big="1"] .store-icon-zone { font-size: 36px !important; width: 76px !important; }
  [data-big="1"] .store-map-btn { width: 68px !important; font-size: 11px !important; }
  [data-big="1"] .store-map-icon { font-size: 28px !important; }
  [data-big="1"] .tts-read-all-btn { font-size: 17px !important; min-height: 64px !important; }
  [data-big="1"] #pageHeader { font-size: 28px !important; letter-spacing: 0.08em; }
  [data-big="1"] .title-input { font-size: 18px !important; padding: 16px !important; }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: var(--font);
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    background: var(--bg);
    position: relative;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px 4px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
    background: var(--bg);
  }
  .status-right { display: flex; align-items: center; gap: 6px; }
  .battery-badge {
    background: #4CAF50;
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 6px;
    border: 2px solid var(--black);
    border-radius: 3px;
  }

  /* ── LANGUAGE SWITCHER (status bar right) ── */
  .lang-switcher {
    display: flex;
    gap: 0;
    border: 2px solid var(--text);
    overflow: hidden;
  }
  .lang-btn {
    padding: 3px 7px;
    font-family: var(--font);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    background: none;
    border: none;
    border-right: 2px solid var(--black);
    color: rgba(0,0,0,0.45);
    transition: background 0.1s, color 0.1s;
  }
  .lang-btn:last-child { border-right: none; }
  .lang-btn.active { background: var(--text); color: var(--bg); }

  /* ── PAGE HEADER ── */
  .page-header {
    padding: 8px 16px 12px;
    font-size: var(--fs-lg);
    color: var(--text);
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ── SCROLL AREA ── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px 100px;
    scrollbar-width: none;
  }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ══════════════════════════════
     SHARED CARD / BUTTON STYLES
  ══════════════════════════════ */
  .note-card {
    background: var(--bg-card);
    border: var(--border);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 16px;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .title-input {
    flex: 1;
    background: var(--input-bg);
    border: var(--border);
    padding: 10px 12px;
    font-family: var(--font);
    font-size: var(--fs-md);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    outline: none;
    color: var(--text);
  }
  .title-input::placeholder { color: var(--text-dim); }
  .title-input:focus { filter: brightness(0.97); }

  .checkbox-icon {
    width: 36px;
    height: 36px;
    border: var(--border);
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 18px;
    transition: background 0.1s;
  }
  .checkbox-icon:hover { background: var(--grey); }

  .brain-dump {
    width: 100%;
    background: var(--input-bg);
    border: var(--border);
    padding: 12px;
    font-family: var(--font);
    font-size: var(--fs-sm);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    resize: none;
    min-height: 100px;
    outline: none;
    color: var(--text);
  }
  .brain-dump::placeholder { color: var(--text-dim); }
  .brain-dump:focus { filter: brightness(0.97); }

  .card-actions {
    display: flex;
    gap: 12px;
    margin-top: 14px;
  }

  .btn {
    flex: 1;
    padding: 14px 10px;
    border: var(--border);
    font-family: var(--font);
    font-size: var(--fs-md);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.08s;
    box-shadow: var(--shadow);
    color: var(--white);
  }
  .btn:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0px var(--black); }
  .btn-blue { background: var(--blue); }
  .btn-pink { background: var(--pink); }
  .btn-grey { background: var(--grey); color: var(--black); }
  .btn-green { background: var(--green); color: var(--black); }

  /* Saved notes list */
  .notes-list { margin-top: 4px; }
  .note-item {
    background: var(--bg-card);
    border: var(--border);
    box-shadow: var(--shadow);
    padding: 14px 16px;
    margin-bottom: 12px;
    cursor: pointer;
  }
  .note-item:hover { background: var(--bg-card); }
  .note-item:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--black); }
  .note-item-title { font-size: var(--fs-md); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; color: var(--text); }
  .note-item-preview { font-size: var(--fs-sm); color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .note-item-meta { font-size: var(--fs-xs); color: var(--text-muted); margin-top: 6px; letter-spacing: 0.05em; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    line-height: 1.9;
  }


  .aisle-label {
    margin-top: 16px;
    margin-bottom: 6px;
    font-size: var(--fs-xs);
    letter-spacing: 0.14em;
    color: var(--accent);
    border-bottom: 2px solid var(--accent);
    padding-bottom: 4px;
  }
  .aisle-label:first-child { margin-top: 0; }

  .extracted-aisle-label {
    font-family: var(--font);
    font-size: var(--fs-xs);
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 10px;
    margin-bottom: 2px;
  }

  /* ══════════════════════════════
     PHASE 4 — GIANT ACCESSIBLE TODAY LIST
  ══════════════════════════════ */
  .list-section-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-left: 2px;
    color: var(--text-muted);
  }

  /* Giant accessible list items — Phase 4 */
  .list-item {
    background: var(--bg-card);
    border: var(--border);
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.08s;
    min-height: 76px;           /* PHASE 4: giant tap targets */
  }
  .list-item:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--black); }
  .list-item.checked { background: var(--grey); border-style: dashed; }
  .list-item.checked .item-label { text-decoration: line-through; color: var(--text-dim); }

  /* PHASE 4: Big fat check zone on the left */
  .item-check-zone {
    width: 72px;
    min-height: 76px;
    border-right: var(--border);
    background: var(--bg-card);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: var(--fs-3xl);
    font-weight: 700;
    transition: background 0.1s;
  }
  .list-item.checked .item-check-zone { background: var(--blue); color: white; }

  .item-content {
    flex: 1;
    padding: 18px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .item-label {
    font-size: 16px;            /* PHASE 4: bigger text */
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.3;
    flex: 1;
  }

  /* PHASE 4: TTS speak button on each item */
  .item-tts-btn {
    width: 44px;
    height: 44px;
    border: 2px solid var(--black);
    background: var(--yellow);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.1s, transform 0.08s;
    box-shadow: 2px 2px 0 var(--black);
  }
  .item-tts-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--black); }
  .item-tts-btn:hover { background: var(--bg-card); }

  /* Completed section divider */
  .done-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 18px 0 12px;
  }
  .done-divider-line {
    flex: 1;
    height: 2px;
    background: rgba(0,0,0,0.2);
  }
  .done-divider-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.4);
    white-space: nowrap;
  }

  /* PHASE 4: Global read-aloud button */
  .tts-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .tts-read-all-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border: var(--border);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: var(--shadow);
    background: var(--black);
    color: var(--yellow);
    transition: transform 0.08s, box-shadow 0.08s;
    flex: 1;
  }
  .tts-read-all-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--black); }
  .tts-read-all-btn.speaking { background: var(--pink); color: var(--black); }

  .tts-stop-btn {
    padding: 12px 14px;
    border: var(--border);
    font-family: var(--font);
    font-size: 18px;
    cursor: pointer;
    box-shadow: var(--shadow);
    background: var(--grey);
    color: var(--black);
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .tts-stop-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--black); }

  /* ══════════════════════════════
     MONTH / BILLS VIEW
  ══════════════════════════════ */
  .bill-item {
    background: var(--bg-card);
    border: var(--border);
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .bill-item:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--black); }
  .bill-item.checked { background: var(--grey); border-style: dashed; }
  .bill-item.checked .bill-name { text-decoration: line-through; color: var(--text-dim); }
  .bill-check {
    width: 28px; height: 28px;
    border: var(--border);
    background: var(--bg-card);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: var(--fs-xl);
  }
  .bill-item.checked .bill-check { background: var(--blue); color: white; }
  .bill-info { flex: 1; }
  .bill-name { font-size: var(--fs-md); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; display: block; }
  .bill-cycle { font-size: var(--fs-xs); color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-top: 2px; }
  .bill-amount { font-size: 14px; font-weight: 700; letter-spacing: 0.04em; flex-shrink: 0; }

  /* ══════════════════════════════
     HISTORY VIEW
  ══════════════════════════════ */
  .history-item {
    background: var(--white);
    border: var(--border);
    box-shadow: var(--shadow);
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .history-item-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .history-title { font-size: var(--fs-md); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text); }
  .history-date { font-size: var(--fs-xs); color: var(--text-muted); letter-spacing: 0.05em; }
  .history-preview { margin-top: 6px; font-size: var(--fs-sm); color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; line-height: 1.5; }

  /* ══════════════════════════════
     BOTTOM NAV
  ══════════════════════════════ */
  .bottom-nav {
    display: flex;
    background: var(--nav-bg);
    border-top: var(--border);
    padding: 0;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .bottom-nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 2px 12px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--nav-text);
    font-family: var(--font);
    font-size: var(--fs-nav);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    gap: 4px;
    transition: background 0.1s;
    border-right: 2px solid rgba(255,255,255,0.12);
    white-space: nowrap;
  }
  .nav-btn:last-child { border-right: none; }
  .nav-btn:hover { background: rgba(255,255,255,0.08); }
  .nav-btn.active { color: var(--nav-active); }
  .nav-icon { font-size: 24px; line-height: 1; }
  /* Nav label — hidden by default, show only if enough room */
  .nav-label {
    font-size: 9px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    line-height: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    display: none; /* hidden; icon + title tooltip is enough */
  }

  /* ── NOTES ARCHIVE TABS ── */
  .notes-tab-bar {
    display: flex;
    border: var(--border);
    box-shadow: 3px 3px 0 var(--black);
    margin-bottom: 14px;
    background: var(--bg);
  }
  .notes-tab {
    flex: 1;
    padding: 12px 8px;
    border: none;
    background: none;
    font-family: var(--font);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    cursor: pointer;
    transition: background 0.1s;
  }
  .notes-tab:first-child { border-right: var(--border); }
  .notes-tab.active { background: var(--text); color: var(--bg); }
  .notes-tab:not(.active):hover { background: var(--grey); }

  /* Permanent delete btn in archive */
  .note-perm-delete {
    background: none;
    border: none;
    font-size: 15px;
    cursor: pointer;
    color: var(--text-dim);
    padding: 0 0 0 4px;
    flex-shrink: 0;
    transition: color 0.1s;
  }
  .note-perm-delete:hover { color: #c0392b; }
  .note-archive-btn {
    background: none;
    border: none;
    font-size: 15px;
    cursor: pointer;
    color: var(--text-dim);
    padding: 0 0 0 4px;
    flex-shrink: 0;
  }
  .note-archive-btn:hover { color: var(--accent); }
  .note-restore-btn {
    font-family: var(--font);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 4px 8px;
    border: var(--border);
    background: var(--bg);
    cursor: pointer;
    color: var(--text);
    margin-top: 6px;
    display: inline-block;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-card);
    border: var(--border);
    box-shadow: 8px 8px 0px var(--black);
    padding: 28px 24px;
    width: calc(100% - 48px);
    max-width: 400px;
    text-align: center;
  }
  .modal-title { font-size: 16px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 20px; }
  .rec-button {
    width: 100px; height: 100px;
    background: var(--pink);
    border: var(--border);
    box-shadow: var(--shadow);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    cursor: pointer;
    font-size: 36px;
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .rec-button:active { transform: translate(3px,3px); box-shadow: 1px 1px 0 var(--black); }
  .rec-button.recording { background: #FF2020; animation: pulse 1s infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: var(--shadow); }
    50% { box-shadow: 6px 6px 0px var(--black), 0 0 0 8px rgba(255,32,32,0.2); }
  }
  .rec-status { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 20px; min-height: 18px; }
  .modal-actions { display: flex; gap: 10px; }

  /* ══════════════════════════════
     GEMINI THINKING STATE
  ══════════════════════════════ */
  .gemini-thinking { display: none; flex-direction: column; align-items: center; gap: 12px; padding: 8px 0 4px; }
  .gemini-thinking.visible { display: flex; }
  .thinking-spinner {
    width: 40px; height: 40px;
    border: 4px solid var(--grey);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .thinking-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }

  /* ══════════════════════════════
     TRANSCRIPTION PANEL
  ══════════════════════════════ */
  .transcription-panel {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--yellow);
    z-index: 150;
    flex-direction: column;
    overflow-y: auto;
  }
  .transcription-panel.open { display: flex; }
  .tp-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: var(--border);
    background: var(--yellow);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .tp-title { font-size: 14px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
  .lang-badge {
    padding: 4px 10px;
    border: var(--border);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    box-shadow: 2px 2px 0 var(--black);
  }
  .lang-badge.pl { background: #E8F5E9; }
  .lang-badge.fr { background: #E3F2FD; }
  .lang-badge.en { background: #FFF3E0; }
  .lang-badge.unknown { background: var(--grey); }
  .tp-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 14px; }
  .tp-section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; }
  .tp-card { background: var(--white); border: var(--border); box-shadow: var(--shadow); padding: 14px 16px; }
  .tp-transcription-text { font-size: 14px; line-height: 1.7; letter-spacing: 0.02em; white-space: pre-wrap; word-break: break-word; }
  .tp-followup-text { font-size: 13px; line-height: 1.6; font-weight: 700; letter-spacing: 0.04em; }
  .confirm-row { display: flex; gap: 12px; margin-top: 4px; }
  .btn-confirm-yes {
    flex: 1;
    padding: 16px 10px;
    border: var(--border);
    font-family: var(--font);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    box-shadow: var(--shadow);
    background: var(--blue);
    color: var(--white);
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .btn-confirm-yes:active { transform: translate(3px,3px); box-shadow: 1px 1px 0 var(--black); }
  .btn-confirm-no {
    flex: 1;
    padding: 16px 10px;
    border: var(--border);
    font-family: var(--font);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    box-shadow: var(--shadow);
    background: var(--grey);
    color: var(--black);
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .btn-confirm-no:active { transform: translate(3px,3px); box-shadow: 1px 1px 0 var(--black); }
  .extracted-list { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .extracted-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--white);
    border: var(--border);
    box-shadow: 3px 3px 0 var(--black);
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .extracted-item::before { content: '+'; font-size: 18px; font-weight: 700; color: var(--blue); }
  .tp-actions {
    display: flex;
    gap: 10px;
    padding: 16px;
    border-top: var(--border);
    background: var(--yellow);
    position: sticky;
    bottom: 0;
  }

  /* ══════════════════════════════
     PHASE 5 — STORES TAB
  ══════════════════════════════ */

  /* Locate button bar */
  .stores-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    align-items: stretch;
  }
  .stores-locate-btn {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border: var(--border);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: var(--shadow);
    background: var(--black);
    color: var(--yellow);
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .stores-locate-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--black); }
  .stores-locate-btn.locating { background: var(--blue); }
  .stores-locate-btn.located  { background: var(--green); color: var(--black); }

  /* Store card */
  .store-card {
    background: var(--white);
    border: var(--border);
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    overflow: hidden;
    position: relative;
  }
  .store-card.detected {
    border-color: var(--blue);
    box-shadow: 4px 4px 0 var(--blue);
  }

  /* "MENTIONED IN LAST NOTE" ribbon */
  .store-detected-ribbon {
    display: none;
    background: var(--blue);
    color: var(--white);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 4px 12px;
    text-align: center;
  }
  .store-card.detected .store-detected-ribbon { display: block; }

  .store-card-body {
    display: flex;
    align-items: center;
    gap: 0;
    min-height: 72px;
  }

  /* Emoji icon zone */
  .store-icon-zone {
    width: 64px;
    min-height: 72px;
    border-right: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
    background: var(--yellow);
  }

  .store-info {
    flex: 1;
    padding: 12px 14px;
  }

  .store-name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .store-address {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .store-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  /* Distance badge */
  .store-distance-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border: 2px solid var(--black);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    background: var(--yellow);
    box-shadow: 2px 2px 0 var(--black);
  }
  .store-distance-badge.nearest { background: var(--green); }

  /* Hours badge */
  .store-hours-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border: 2px solid var(--black);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    box-shadow: 2px 2px 0 var(--black);
  }
  .store-hours-badge.open   { background: var(--green); color: var(--white); }
  .store-hours-badge.closed { background: var(--grey); }
  .store-hours-badge.loading { background: var(--grey); }

  /* Map link button */
  .store-map-btn {
    width: 56px;
    min-height: 72px;
    border-left: var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: var(--yellow);
    cursor: pointer;
    text-decoration: none;
    flex-shrink: 0;
    font-family: var(--font);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--black);
    transition: background 0.1s;
  }
  .store-map-btn:hover { background: var(--bg-card); }
  .store-map-btn:active { background: var(--grey); }
  .store-map-icon { font-size: 22px; }
  .store-call-btn { background: var(--green); color: var(--white); }
  .store-call-btn:hover { opacity: 0.85; }

  /* Actions column (map + waze stacked) */
  .store-actions {
    display: flex;
    flex-direction: column;
    border-left: var(--border);
    flex-shrink: 0;
  }

  /* Expand branches row */
  .store-expand-row {
    border-top: var(--border);
  }
  .store-expand-btn {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg);
    border: none;
    font-family: var(--font);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--black);
    cursor: pointer;
    text-align: left;
    transition: background 0.1s;
  }
  .store-expand-btn:hover { background: var(--yellow); }
  .store-expand-btn:active { background: var(--grey); }

  /* Stores empty state */
  .stores-empty {
    text-align: center;
    padding: 40px 20px;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.4);
    line-height: 2;
  }


  /* Theme picker buttons */
  .settings-row-theme {
    flex-wrap: wrap;
    gap: 10px;
  }
  .settings-theme-btns {
    display: flex;
    gap: 8px;
  }
  .settings-theme-btn {
    width: 52px;
    height: 52px;
    font-size: 22px;
    border: 3px solid var(--black);
    background: var(--bg-card);
    box-shadow: 3px 3px 0px var(--black);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .settings-theme-btn.active {
    box-shadow: none;
    transform: translate(3px, 3px);
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }

  /* ══════════════════════════════
     PHASE 6 — SETTINGS TAB
  ══════════════════════════════ */

  /* Card container */
  .settings-card {
    background: var(--bg-card);
    border: var(--border);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    overflow: hidden;
  }

  /* Each row */
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 18px;
    min-height: 76px;
  }
  .settings-row-lang {
    flex-direction: column;
    align-items: flex-start;
    gap: 14px;
    padding-bottom: 22px;
  }
  .settings-row-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .settings-row-icon { font-size: 18px; }

  .settings-divider {
    height: 3px;
    background: var(--black);
  }

  /* ── Neubrutalist toggle switch ── */
  .nb-toggle {
    display: flex;
    align-items: center;
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
  }
  .nb-toggle input { display: none; }
  .nb-toggle-track {
    position: relative;
    width: 62px;
    height: 34px;
    background: var(--grey);
    border: 3px solid var(--black);
    box-shadow: 3px 3px 0px var(--black);
    display: flex;
    align-items: center;
    transition: background 0.15s;
  }
  .nb-toggle input:checked + .nb-toggle-track {
    background: var(--blue);
  }
  .nb-toggle-thumb {
    position: absolute;
    left: 3px;
    width: 22px;
    height: 22px;
    background: var(--black);
    transition: left 0.15s;
  }
  .nb-toggle input:checked + .nb-toggle-track .nb-toggle-thumb {
    left: 31px;
    background: var(--yellow);
  }

  /* ── Language block buttons ── */
  .settings-lang-btns {
    display: flex;
    gap: 0;
    width: 100%;
  }
  .settings-lang-btn {
    flex: 1;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 16px 4px;
    border: 3px solid var(--black);
    border-right: none;
    background: var(--white);
    color: var(--black);
    cursor: pointer;
    text-align: center;
    box-shadow: 3px 3px 0px var(--black);
    transition: background 0.1s, color 0.1s, box-shadow 0.1s, transform 0.1s;
  }
  .settings-lang-btn:last-child { border-right: 3px solid var(--black); }
  .settings-lang-btn.active {
    background: var(--black);
    color: var(--yellow);
    box-shadow: none;
    transform: translate(3px, 3px);
  }

  /* About block */
  .settings-about {
    padding: 18px;
    text-align: center;
  }
  .settings-about-title {
    font-family: var(--font);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--black);
  }
  .settings-about-sub {
    font-family: var(--font);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: rgba(0,0,0,0.4);
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* ══════════════════════════════
     TOAST
  ══════════════════════════════ */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--black);
    color: var(--yellow);
    padding: 10px 20px;
    font-family: var(--font);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 2px solid var(--yellow);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 200;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ══════════════════════════════
     PHASE 8 — FIREBASE VIEWS
  ══════════════════════════════ */

  .firebase-status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: var(--fs-xs);
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .fb-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #888;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .fb-dot.live    { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .fb-dot.offline { background: #e53935; }

  /* Bring list items */
  .bring-item {
    background: var(--bg-card);
    border: var(--border);
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    min-height: 72px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .bring-item:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--black); }
  .bring-item.packed { background: var(--grey); border-style: dashed; opacity: 0.7; }
  .bring-check-zone {
    width: 66px;
    min-height: 72px;
    border-right: var(--border);
    background: var(--bg-card);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: var(--fs-2xl);
    transition: background 0.1s;
  }
  .bring-item.packed .bring-check-zone { background: var(--green); color: white; }
  .bring-item-text {
    flex: 1;
    padding: 0 14px;
    font-size: var(--fs-xl);
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--text);
  }
  .bring-item.packed .bring-item-text { text-decoration: line-through; color: var(--text-muted); }
  .bring-delete {
    width: 44px;
    min-height: 72px;
    border-left: var(--border);
    background: none;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .bring-delete:active { background: #e53935; color: white; }

  /* Ledger */
  .ledger-summary {
    background: var(--black);
    color: var(--bg);
    border: var(--border);
    box-shadow: var(--shadow);
    padding: 18px 20px;
    font-size: var(--fs-xl);
    font-weight: 700;
    letter-spacing: 0.06em;
    text-align: center;
    margin-bottom: 14px;
  }
  .ledger-item {
    background: var(--bg-card);
    border: var(--border);
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .ledger-item.settled { opacity: 0.5; border-style: dashed; }
  .ledger-item-info { flex: 1; }
  .ledger-item-desc {
    font-size: var(--fs-md);
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text);
    display: block;
  }
  .ledger-item-meta {
    font-size: var(--fs-xs);
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin-top: 3px;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ledger-item-amount {
    font-size: var(--fs-lg);
    font-weight: 700;
    color: var(--text);
    flex-shrink: 0;
  }
  .ledger-settle-btn {
    padding: 8px 12px;
    border: var(--border);
    background: var(--accent);
    color: white;
    font-family: var(--font);
    font-size: var(--fs-xs);
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    box-shadow: 2px 2px 0 var(--black);
    flex-shrink: 0;
  }
  .ledger-settle-btn:active { transform: translate(2px,2px); box-shadow: none; }

  /* Live dot on nav */
  .nav-live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    position: absolute;
    top: 8px; right: 6px;
    box-shadow: 0 0 5px var(--green);
  }
  .nav-btn { position: relative; }

</style>
</head>
<body>

<div class="app">

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span id="clockDisplay">22:20</span>
    <div class="status-right">
    </div>
  </div>

  <!-- PAGE HEADER -->
  <div class="page-header" id="pageHeader">DAD APP</div>

  <!-- SCROLL AREA -->
  <div class="scroll-area">

    <!-- ── NOTES VIEW ── -->
    <div class="view active" id="view-notes">
      <div class="note-card">
        <div class="card-header">
          <input class="title-input" id="titleInput" type="text" maxlength="60">
          <div class="checkbox-icon" id="noteToggle" title="Mark complete">☐</div>
        </div>
        <textarea class="brain-dump" id="brainDump" rows="5"></textarea>
        <div class="card-actions">
          <button class="btn btn-blue" id="btnSaveNote" onclick="saveNote()"></button>
          <button class="btn btn-pink" id="btnRecAudio" onclick="openRecorder()"></button>
        </div>
      </div>

      <!-- Archive toggle -->
      <div class="notes-tab-bar">
        <button class="notes-tab active" id="notesTabActive" onclick="setNotesTab('active')">📝 <span data-i18n="notes_tab_active"></span></button>
        <button class="notes-tab" id="notesTabArchive" onclick="setNotesTab('archive')">🗂️ <span data-i18n="notes_tab_archive"></span></button>
      </div>

      <div class="notes-list" id="notesList"></div>
    </div>

    <!-- ── TODAY VIEW ── -->
    <div class="view" id="view-today">
      <!-- PHASE 4: TTS control bar -->
      <div class="tts-bar">
        <button class="tts-read-all-btn" id="ttsReadAllBtn" onclick="ttsReadAll()">
          <span>🔊</span><span id="ttsReadAllLabel"></span>
        </button>
        <button class="tts-stop-btn" onclick="ttsStop()" title="Stop">⏹</button>
      </div>

      <div id="todayList"></div>

      <div class="note-card" style="margin-top:16px;">
        <input class="title-input" id="todayInput" type="text" maxlength="80" style="width:100%; margin-bottom:10px;">
        <button class="btn btn-blue" id="btnAddItem" style="width:100%;" onclick="addTodayItem()"></button>
      </div>
    </div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, query, orderBy, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  const firebaseConfig = window.DAD_CONFIG?.FIREBASE || {};

  const fbApp = initializeApp(firebaseConfig);
  const db    = getFirestore(fbApp);

  // ── Expose to global scope for vanilla JS handlers ──────────
  window._fb = { db, collection, addDoc, onSnapshot, doc, updateDoc, query, orderBy, serverTimestamp };

  // ── BRING LIST listener ─────────────────────────────────────
  const bringQ = query(collection(db, 'bringlist'), orderBy('createdAt', 'desc'));
  onSnapshot(bringQ, (snap) => {
    window._bringDocs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    window.renderBring && window.renderBring();
    // Show live dot on nav if there are unpacked items
    const unpacked = window._bringDocs.filter(x => !x.packed).length;
    const dot = document.getElementById('bringDot');
    if (dot) dot.style.display = unpacked > 0 ? 'block' : 'none';
    // Status bar
    setFbStatus('bring', 'live');
  }, (err) => { console.error(err); setFbStatus('bring', 'offline'); });

  // ── LEDGER listener ─────────────────────────────────────────
  const ledgerQ = query(collection(db, 'ledger'), orderBy('createdAt', 'desc'));
  onSnapshot(ledgerQ, (snap) => {
    window._ledgerDocs = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(x => !x.deleted);
    window.renderLedger && window.renderLedger();
    setFbStatus('ledger', 'live');
  }, (err) => { console.error(err); setFbStatus('ledger', 'offline'); });

  function setFbStatus(view, state) {
    const dot    = document.getElementById(view + 'FbDot');
    const status = document.getElementById(view + 'FbStatus');
    if (!dot || !status) return;
    dot.className = 'fb-dot ' + state;
    // Use t() from global scope
    const label = state === 'live'
      ? (window.t ? window.t('fb_live') : 'LIVE')
      : (window.t ? window.t('fb_offline') : 'OFFLINE');
    status.textContent = label;
  }
  window._setFbStatus = setFbStatus;
</script>

function t(key, ...args) {
  const str = I18N[uiLang]?.[key] ?? I18N['en']?.[key] ?? key;
  return typeof str === 'function' ? str(...args) : str;
}
window.t = t; // expose early so Firebase module callbacks have it immediately

function setUiLang(lang) {
  uiLang = lang;
  localStorage.setItem('dadapp_lang', lang);
  // Update switcher buttons
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === lang.toUpperCase());
  });
  applyI18n();
  renderAll();
}

  document.querySelectorAll('[data-i18n]').forEach(el => {

  document.getElementById('btnAddItem').textContent = t('btn_add_item');
  document.getElementById('btnAddBill').textContent = t('btn_add_bill');

  if (bringInp) bringInp.placeholder = t('bring_input_placeholder');
  const ledgerDescInp = document.getElementById('ledgerDesc');

  // data-i18n-opt select options
  document.querySelectorAll('[data-i18n-opt]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n-opt'));
  });

  // data-i18n-btn buttons
  document.querySelectorAll('[data-i18n-btn]').forEach(btn => {
    btn.textContent = t(btn.getAttribute('data-i18n-btn'));
  });
  // data-i18n-placeholder inputs
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
  });

  // TTS button

  // Recording modal
  document.querySelector('#recModalTitle span').textContent = t('rec_title');

    document.getElementById('recStatus').textContent = t('rec_tap_start');
  }

  // Page header
  const currentView = document.querySelector('.nav-btn.active')?.dataset?.view || 'notes';
  const headerMap = {
    notes: t('view_notes'),
    today: t('view_today'),
    stores: t('view_stores'),

    bills: t('view_bills'),

    settings: t('view_settings'),
    bring: t('view_bring'),

}

let notesTab = 'active'; // 'active' | 'archive'

function setNotesTab(tab) {
  notesTab = tab;
  document.getElementById('notesTabActive').classList.toggle('active', tab === 'active');
  document.getElementById('notesTabArchive').classList.toggle('active', tab === 'archive');
  renderNotes();
}

function renderNotes() {
  const el = document.getElementById('notesList');
  if (!el) return;

  const allNotes = state.notes;
  const list = notesTab === 'archive'
    ? allNotes.map((n, i) => ({n, i})).filter(({n}) => n.deleted)
    : allNotes.map((n, i) => ({n, i})).filter(({n}) => !n.deleted);

  if (!list.length) {
    el.innerHTML = `<div class="empty-state">${escHtml(notesTab === 'archive' ? t('notes_archive_empty') || 'ARCHIVE IS EMPTY' : t('no_notes_yet')).replace('\n','<br>')}</div>`;
    return;
  }

  el.innerHTML = list.map(({n, i}) => {
    const isAudio = !!n.audioUrl;
    const isArchive = notesTab === 'archive';

    const actionBtns = isArchive
      ? `<button class="note-archive-btn" onclick="event.stopPropagation();restoreNote(${i})" title="Restore">↩️</button>
         <button class="note-perm-delete" onclick="event.stopPropagation();if(confirm('Permanently delete?'))permDeleteNote(${i})" title="Delete forever">🗑️</button>`
      : `<button class="note-archive-btn" onclick="event.stopPropagation();shareNote(${i})" title="Share">📤</button>
         <button class="note-archive-btn" onclick="event.stopPropagation();archiveNote(${i})" title="Archive">🗂️</button>`;

    return `
    <div class="note-item" onclick="${isAudio || isArchive ? '' : `loadNote(${i})`}" style="${isAudio || isArchive ? 'cursor:default' : ''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div class="note-item-title">${isAudio ? '🎙️ ' : ''}${escHtml(n.title || '(UNTITLED)')}</div>
        <div style="display:flex;gap:2px;align-items:center;">${actionBtns}</div>
      </div>
      ${isAudio ? `
        <audio controls src="${n.audioUrl}" style="width:100%;margin-top:8px;height:40px;" onclick="event.stopPropagation()"></audio>
        ${!isArchive ? `<button onclick="event.stopPropagation();retranscribe(${i})" style="width:100%;margin-top:8px;padding:10px;background:#2F35E1;color:white;border:2px solid #000;font-family:var(--font);font-size:11px;font-weight:700;letter-spacing:0.1em;cursor:pointer;">🔤 TRANSCRIBE</button>` : ''}
      ` : n.body ? `<div class="note-item-preview">${escHtml(n.body)}</div>` : ''}
      <div class="note-item-meta">${n.date || ''}${n.deletedAt ? ' · 🗂️ ' + new Date(n.deletedAt).toLocaleDateString('en-CA',{month:'short',day:'numeric'}).toUpperCase() : ''}</div>
    </div>`;
  }).join('');
}

// ── PHASE 4: GIANT ACCESSIBLE TODAY RENDER ─────────────────
function renderToday() {
  const el = document.getElementById('todayList');
  const active = state.todayItems.filter(x => !x.done);
  const done   = state.todayItems.filter(x => x.done);

  if (!state.todayItems.length) {
    el.innerHTML = `<div class="empty-state">${escHtml(t('today_empty')).replace('\n','<br>')}</div>`;
    return;
  }

  let html = '';

  // Group active items by aisle if any have aisle tags
  const hasAisles = active.some(x => x.aisle);
  if (hasAisles) {
    // Build ordered aisle groups preserving insertion order
    const groups = [];
    const seen = {};
    active.forEach(item => {
      const key = item.aisle || 'Other';
      if (!seen[key]) { seen[key] = true; groups.push({ aisle: key, items: [] }); }
      groups.find(g => g.aisle === key).items.push(item);
    });
    groups.forEach(group => {
      html += `<div class="list-section-label aisle-label">🛒 ${escHtml(aisleLabel(group.aisle))}</div>`;
      group.items.forEach(item => {
        const i = state.todayItems.indexOf(item);
        html += `
          <div class="list-item" onclick="toggleToday(${i})">
            <div class="item-check-zone"></div>
            <div class="item-content">
              <div class="item-label">${escHtml(item.text)}</div>
              <button class="item-tts-btn" onclick="event.stopPropagation(); ttsSpeakItem('${escAttr(item.text)}', '${item.lang || uiLang}')" title="Read aloud">🔊</button>
            </div>
          </div>`;
      });
    });
  } else {
    // No aisle data — flat list (manually added items)
    active.forEach(item => {
      const i = state.todayItems.indexOf(item);
      html += `
        <div class="list-item" onclick="toggleToday(${i})">
          <div class="item-check-zone"></div>
          <div class="item-content">
            <div class="item-label">${escHtml(item.text)}</div>
            <button class="item-tts-btn" onclick="event.stopPropagation(); ttsSpeakItem('${escAttr(item.text)}', '${item.lang || uiLang}')" title="Read aloud">🔊</button>
          </div>
        </div>`;
    });
  }

  // Done divider + completed items
  if (done.length) {
    html += `
      <div class="done-divider">
        <div class="done-divider-line"></div>
        <div class="done-divider-label">${t('today_done_label')} (${done.length})</div>
        <div class="done-divider-line"></div>
        <button onclick="event.stopPropagation();clearDoneToArchive()"
          style="flex-shrink:0;font-family:var(--font);font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 10px;border:2px solid var(--black);background:var(--bg);color:var(--black);cursor:pointer;white-space:nowrap;box-shadow:2px 2px 0 var(--black);">
          🗂️ CLEAR
        </button>
      </div>`;
    done.forEach(item => {
      const i = state.todayItems.indexOf(item);
      html += `
        <div class="list-item checked" onclick="toggleToday(${i})">
          <div class="item-check-zone">✓</div>
          <div class="item-content">
            <div class="item-label">${escHtml(item.text)}</div>
            <button class="item-tts-btn" onclick="event.stopPropagation(); ttsSpeakItem('${escAttr(item.text)}', '${item.lang || uiLang}')" title="Read aloud">🔊</button>
          </div>
        </div>`;
    });
  }

  el.innerHTML = html;
}

function clearDoneToArchive() {
  const done = state.todayItems.filter(x => x.done);
  if (!done.length) return;

  // Build a note body from all done items
  const body = done.map(x => '✓ ' + x.text).join('\n');
  const now  = new Date();
  const dateStr = now.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase();

  // Push to notes as archived (deleted=true = archive)
  state.notes.unshift({
    title: '🗂️ LIST — ' + dateStr,
    body,
    date: dateStr,
    deleted: true,
    deletedAt: now.toISOString()
  });

  // Remove done items from today list
  state.todayItems = state.todayItems.filter(x => !x.done);

  save();
  renderToday();
  renderNotes();
  showToast('🗂️ ' + done.length + ' ITEM' + (done.length > 1 ? 'S' : '') + ' ARCHIVED');
}

function renderBills() {
  const thisCycle = state.bills.filter(b => !b.next);
  const nextCycle = state.bills.filter(b => b.next);
  document.getElementById('billsList').innerHTML = thisCycle.map((b, i) => billHTML(b, state.bills.indexOf(b))).join('');
  document.getElementById('nextBillsList').innerHTML = nextCycle.length
    ? nextCycle.map(b => billHTML(b, state.bills.indexOf(b))).join('')
    : `<div class="empty-state" style="padding:20px 0;">${t('nothing_next')}</div>`;
}

function billHTML(b, i) {

    <div class="bill-item ${b.paid ? 'checked' : ''}" onclick="toggleBill(${i})">

function renderHistory() {

// ═══════════════════════════════════════════════════════════
// PHASE 4 — TEXT-TO-SPEECH ENGINE
// Uses Web Speech API: SpeechSynthesis.
// Automatically picks correct voice for pl-PL, fr-FR, en-CA
// based on detected Gemini language OR current UI language.
// ═══════════════════════════════════════════════════════════
let isTtsSpeaking = false;
let ttsCurrentUtterance = null;

// Map our lang codes to BCP-47 locale codes
const TTS_LOCALE = { pl: 'pl-PL', fr: 'fr-FR', en: 'en-CA' };

function ttsLangCode(lang) {
  return TTS_LOCALE[lang] || TTS_LOCALE[uiLang] || 'fr-FR';
}

/**
 * Speak a single item aloud.
 * @param {string} text
 * @param {string} lang  — 'pl', 'fr', or 'en'
 */
function ttsSpeakItem(text, lang) {
  if (!window.speechSynthesis) {
    showToast(t('toast_tts_unsupported'));
    return;
  }
  window.speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = ttsLangCode(lang);
  utter.rate = 0.95;
  utter.pitch = 1.0;

  // Try to find a matching voice; fall back gracefully
  const voices = window.speechSynthesis.getVoices();
  const match = voices.find(v => v.lang.startsWith(utter.lang.slice(0,2)));
  if (match) utter.voice = match;

  isTtsSpeaking = true;
  updateTtsBtn();
  utter.onend = () => { isTtsSpeaking = false; updateTtsBtn(); };
  utter.onerror = () => { isTtsSpeaking = false; updateTtsBtn(); };
  ttsCurrentUtterance = utter;
  window.speechSynthesis.speak(utter);
}

/**
 * PHASE 4: Read the entire active Today list aloud,
 * item by item, in the language each item was recorded in.
 */
function ttsReadAll() {
  if (!window.speechSynthesis) {
    showToast(t('toast_tts_unsupported'));
    return;
  }
  if (isTtsSpeaking) {
    ttsStop();
    return;
  }

  const activeItems = state.todayItems.filter(x => !x.done);
  if (!activeItems.length) {
    showToast(t('today_empty').split('\n')[0]);
    return;
  }

  window.speechSynthesis.cancel();
  isTtsSpeaking = true;
  updateTtsBtn();

  // Chain utterances for each item
  let index = 0;
  function speakNext() {
    if (index >= activeItems.length || !isTtsSpeaking) {
      isTtsSpeaking = false;
      updateTtsBtn();
      return;
    }
    const item = activeItems[index++];
    const utter = new SpeechSynthesisUtterance(item.text);
    utter.lang = ttsLangCode(item.lang || uiLang);
    utter.rate = 0.9;
    utter.pitch = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const match = voices.find(v => v.lang.startsWith(utter.lang.slice(0,2)));
    if (match) utter.voice = match;
    utter.onend = speakNext;
    utter.onerror = () => { isTtsSpeaking = false; updateTtsBtn(); };
    ttsCurrentUtterance = utter;
    window.speechSynthesis.speak(utter);
  }
  speakNext();
}

function ttsStop() {
  isTtsSpeaking = false;
  window.speechSynthesis?.cancel();
  updateTtsBtn();
}

function updateTtsBtn() {
  const btn = document.getElementById('ttsReadAllBtn');
  const lbl = document.getElementById('ttsReadAllLabel');
  if (!btn) return;
  btn.classList.toggle('speaking', isTtsSpeaking);
  lbl.textContent = isTtsSpeaking ? t('tts_speaking') : t('tts_read_all');
}

// Load voices async (Chrome needs this)
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => {};
}

// ── RECORDING MODAL ─────────────────────────────────────────
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let recTimer = null;
let recSeconds = 0;

function openRecorder() {
  document.getElementById('recModal').classList.add('open');
}

function closeRecorder() {
  if (isRecording) stopRecording();
  document.getElementById('recModal').classList.remove('open');
  document.getElementById('recStatus').textContent = t('rec_tap_start');
  document.getElementById('saveRecBtn').disabled = true;
  document.getElementById('recUI').style.display = 'block';
  document.getElementById('geminiThinking').classList.remove('visible');
  audioChunks = [];
}

function toggleRecording() {
  if (!isRecording) startRecording();
  else stopRecording();
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.start();
    isRecording = true;
    recSeconds = 0;
    document.getElementById('recButton').classList.add('recording');
    document.getElementById('recButton').textContent = '⏹';
    document.getElementById('saveRecBtn').disabled = true;
    recTimer = setInterval(() => {
      recSeconds++;
      const m = String(Math.floor(recSeconds/60)).padStart(2,'0');
      const s = String(recSeconds%60).padStart(2,'0');
      document.getElementById('recStatus').textContent = `● REC ${m}:${s}`;
    }, 1000);
  } catch(e) {
    showToast(t('toast_mic_denied'));
  }
}

function stopRecording() {
  if (!mediaRecorder) return;
  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(tr => tr.stop());
  isRecording = false;
  clearInterval(recTimer);
  document.getElementById('recButton').classList.remove('recording');
  document.getElementById('recButton').textContent = '🎙';
  document.getElementById('recStatus').textContent = `${t('rec_saved')} (${recSeconds}s)`;
  document.getElementById('saveRecBtn').disabled = false;
}

// ═══════════════════════════════════════════════════════════
// PHASE 3 — GEMINI AUDIO PIPELINE (unchanged, now trilingual)
// ═══════════════════════════════════════════════════════════
let geminiResult = null;
let geminiAttempted = false;

async function sendToGemini() {
  if (!audioChunks.length) return;
  document.getElementById('recUI').style.display = 'none';
  document.getElementById('geminiThinking').classList.add('visible');
  document.getElementById('thinkingLabel').textContent = t('thinking_converting');

  try {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    document.getElementById('thinkingLabel').textContent = t('thinking_sending');
    const base64Audio = await blobToBase64(blob);
    const audioData = base64Audio.split(',')[1];
    // Detect actual MIME type recorded by this device
    const mimeType = blob.type || 'audio/webm';
    // Gemini only accepts: audio/wav, audio/mp3, audio/aiff, audio/aac, audio/ogg, audio/flac, audio/webm
    // Map mp4 → aac which Gemini accepts
    const geminiMime = mimeType.includes('mp4') ? 'audio/mp4'
                     : mimeType.includes('ogg') ? 'audio/ogg'
                     : mimeType.includes('aac') ? 'audio/aac'
                     : mimeType.includes('webm') ? 'audio/webm'
                     : 'audio/webm';

    const systemPrompt = `You are a transcription assistant for a bilingual family app used by a French-Canadian father.
Audio notes are spoken in Polish (pl), French (fr), or English (en).

Analyze the audio and return ONLY a valid JSON object with NO preamble, NO markdown, NO backticks.

Required JSON structure:
{
  "detected_language": "pl" or "fr" or "en" or "unknown",
  "transcription": "exact transcription of what was said",
  "follow_up": "a single question in the detected language asking if the user wants to convert this note into a checklist",
  "aisles": [
    { "aisle": "Produce",  "items": ["carrots", "apples"] },
    { "aisle": "Dairy",    "items": ["milk", "butter"] },
    { "aisle": "Meat",     "items": ["chicken"] },
    { "aisle": "Bakery",   "items": ["bread"] },
    { "aisle": "Frozen",   "items": ["pizza"] },
    { "aisle": "Pantry",   "items": ["pasta", "olive oil"] },
    { "aisle": "Beverages","items": ["orange juice"] },
    { "aisle": "Pharmacy", "items": ["aspirin"] },
    { "aisle": "Other",    "items": ["anything uncategorized"] }
  ],
  "list_items": ["flat array of ALL items combined across all aisles — for backward compatibility"],
  "detected_stores": ["array", "of", "store", "or", "brand", "names", "mentioned"]
}

Rules:
- detected_language must be exactly "pl", "fr", "en", or "unknown"
- transcription must be verbatim in the original language
- follow_up must be in the SAME language as the transcription
  - Polish: ask using "Tak / Nie" framing
  - French: ask using "Oui / Non" framing
  - English: ask using "Yes / No" framing
- aisles: group every extracted item into the most logical grocery store aisle. Omit aisles with zero items. Keep item names in the language they were spoken.
- list_items: flat array of ALL items (same items as aisles, just unnested) for backward compatibility. Empty array [] if no items.
- detected_stores: store names, grocery chains, pharmacies, or retail brands mentioned (Maxi, Costco, IGA, Pharmaprix, Dollarama, Sami Fruits, etc). Empty [] if none.
- Return ONLY the JSON. Nothing else.`;

    const requestBody = {
      systemInstruction: { parts: [{ text: systemPrompt }] },
      contents: [{
        parts: [
          { inline_data: { mime_type: geminiMime, data: audioData } },
          { text: 'Transcribe and analyze this audio note.' }
        ]
      }],
      generationConfig: { temperature: 0.1, maxOutputTokens: 1000 }
    };

    document.getElementById('thinkingLabel').textContent = t('thinking_analysing');
    const response = await fetch(`${GEMINI_ENDPOINT}?key=${getGeminiKey()}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(requestBody)
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error(`Gemini API error ${response.status}: ${errText}`);
    }

    const data = await response.json();
    const rawText = data.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('') || '';
    const cleanJson = rawText.replace(/```json/gi,'').replace(/```/g,'').trim();
    geminiResult = JSON.parse(cleanJson);

    // PHASE 5: Match detected stores against favourites list
    if (geminiResult.detected_stores?.length) {
      matchDetectedStores(geminiResult.detected_stores);
      // Navigate to Stores tab and toast
      const storeNames = geminiResult.detected_stores.join(', ');
      showToast(t('toast_stores_detected', storeNames));
      // Invalidate hours cache so fresh hours are fetched
      detectedStoreIds.forEach(id => {
        const store = favoriteStores.find(s => s.id === id);
        if (store) delete storeHoursCache[store.placeId];
      });
      // Auto-switch to Stores tab after a short delay so user sees the toast
      setTimeout(() => {
        const storesBtn = document.querySelector('[data-view="stores"]');
        if (storesBtn) switchView('stores', storesBtn);
      }, 800);
    }

    closeRecorder();
    showTranscriptionPanel(geminiResult);

  } catch (err) {
    console.error('Gemini pipeline error:', err);
    document.getElementById('geminiThinking').classList.remove('visible');
    document.getElementById('recUI').style.display = 'block';
    // Show detailed error in toast if available
    const errMsg = err.message?.slice(0, 120) || t('toast_gemini_err');
    showToast('❌ ' + errMsg);
    // Only save as audio note if we haven't already saved one for this recording
    if (!geminiAttempted) {
      geminiAttempted = true;
      savePlainAudioNote();
    }
  }
}

function showTranscriptionPanel(result) {
  const lang = result.detected_language || 'unknown';

  const badge = document.getElementById('langBadge');
  badge.className = `lang-badge ${lang}`;
  badge.textContent = lang === 'pl' ? '🇵🇱 POLSKI'
                    : lang === 'fr' ? '🇫🇷 FRANÇAIS'
                    : lang === 'en' ? '🇬🇧 ENGLISH'
                    : '🌐 UNKNOWN';

  document.getElementById('tpTranscriptionText').textContent =
    result.transcription || t('tp_no_transcription');
  document.getElementById('tpFollowupText').textContent = result.follow_up || '';

  // Apply current i18n to the static labels in the panel
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  document.getElementById('btnDiscard').textContent = t('btn_discard');
  document.getElementById('btnSaveAsNote').textContent = t('btn_save_as_note');

  const confirmRow = document.getElementById('confirmRow');
  if (result.list_items && result.list_items.length > 0) {
    // Use language-appropriate confirm labels from result lang, not UI lang
    const yesLabel = lang === 'pl' ? 'TAK ✓' : lang === 'en' ? 'YES ✓' : 'OUI ✓';
    const noLabel  = lang === 'pl' ? 'NIE ✗'  : lang === 'en' ? 'NO ✗'  : 'NON ✗';
    confirmRow.innerHTML = `
      <button class="btn-confirm-yes" onclick="confirmAddToList()">${yesLabel}</button>
      <button class="btn-confirm-no"  onclick="declineAddToList()">${noLabel}</button>`;
  } else {
    document.getElementById('tpFollowupSection').style.display = 'none';
    confirmRow.innerHTML = '';
  }

  document.getElementById('tpExtractedSection').style.display = 'none';
  document.getElementById('transcriptionPanel').classList.add('open');
}

function confirmAddToList() {
  if (!geminiResult?.list_items?.length) return;
  const detectedLang = geminiResult.detected_language || uiLang;
  const aisles = geminiResult.aisles;

  // Show extracted items grouped by aisle if available, else flat
  const list = document.getElementById('extractedList');
  if (aisles?.length) {
    list.innerHTML = aisles.map(group => `
      <div class="extracted-aisle-label">${escHtml(aisleLabel(group.aisle))}</div>
      ${group.items.map(item => `<div class="extracted-item">${escHtml(item)}</div>`).join('')}
    `).join('');
  } else {
    list.innerHTML = geminiResult.list_items.map(item =>
      `<div class="extracted-item">${escHtml(item)}</div>`).join('');
  }
  document.getElementById('tpExtractedSection').style.display = 'block';
  document.getElementById('confirmRow').innerHTML = '';
  document.getElementById('tpFollowupSection').querySelector('.tp-followup-text').textContent =
    t('added_to_list');

  // Add items to Today list with aisle tag for renderToday grouping
  if (aisles?.length) {
    aisles.forEach(group => {
      group.items.forEach(item => {
        state.todayItems.unshift({ text: item, done: false, lang: detectedLang, aisle: group.aisle });
      });
    });
  } else {
    geminiResult.list_items.forEach(item => {
      state.todayItems.unshift({ text: item, done: false, lang: detectedLang });
    });
  }
  save();
  renderToday();
  showToast(t('items_added', geminiResult.list_items.length));
}

// Map Gemini aisle name → i18n key → translated label
function aisleLabel(aisle) {
  const map = {
    'Produce': 'aisle_produce', 'Dairy': 'aisle_dairy', 'Meat': 'aisle_meat',
    'Bakery': 'aisle_bakery', 'Frozen': 'aisle_frozen', 'Pantry': 'aisle_pantry',
    'Beverages': 'aisle_beverages', 'Pharmacy': 'aisle_pharmacy', 'Other': 'aisle_other',
  };
  return t(map[aisle] || 'aisle_other');
}

function declineAddToList() {
  document.getElementById('confirmRow').innerHTML = '';
  document.getElementById('tpFollowupSection').style.display = 'none';
  showToast(t('toast_note_ok_no_list'));
}

function saveTranscriptionAsNote() {
  if (!geminiResult) return;
  const now = new Date();
  const lang = geminiResult.detected_language || 'unknown';
  state.notes.push({
    id: Date.now(),
    title: `🎙 ${lang.toUpperCase()} NOTE — ${now.toLocaleTimeString('en-CA', { hour:'2-digit', minute:'2-digit' })}`,
    body: geminiResult.transcription || '',
    lang,
    done: false,
    date: now.toLocaleDateString('en-CA', { month:'short', day:'numeric', year:'numeric' }).toUpperCase(),
  });
  save();
  renderNotes();
  dismissTranscription();
  showToast(t('toast_tp_saved'));

function dismissTranscription() {

function savePlainAudioNote() {
  if (!audioChunks.length) return;
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  const now = new Date();
  // Store as base64 so audio persists across page reloads
  const reader = new FileReader();
  reader.onload = () => {
    state.notes.push({
      id: Date.now(),
      title: `🎙 AUDIO NOTE ${now.toLocaleTimeString('en-CA', { hour:'2-digit', minute:'2-digit' })}`,
      body: `[Audio recording — ${recSeconds}s]`,
      audioUrl: reader.result,   // base64 data URL — survives reload
      audioWebm: reader.result,  // keep raw for re-transcription
      done: false,
      lang: uiLang,
      date: now.toLocaleDateString('en-CA', { month:'short', day:'numeric', year:'numeric' }).toUpperCase(),
    });
    save();
    renderNotes();
  };
  reader.readAsDataURL(blob);
  closeRecorder();
  showToast(t('toast_gemini_err'));
}

function archiveNote(i) {
  state.notes[i].deleted = true;
  state.notes[i].deletedAt = new Date().toISOString();
  save();
  renderNotes();
  showToast(t('notes_archived'));
}

function restoreNote(i) {
  delete state.notes[i].deleted;
  delete state.notes[i].deletedAt;
  save();
  renderNotes();
  showToast(t('notes_restored'));
}

function permDeleteNote(i) {
  state.notes.splice(i, 1);
  save();
  renderNotes();
  showToast(t('notes_perm_deleted'));
}

// Keep old name as alias so any remaining references don't break
function deleteNote(i) { archiveNote(i); }

async function shareNote(i) {
  const n = state.notes[i];
  if (!n) return;
  const title = n.title || t('no_notes_yet') || 'Note';
  const text  = n.body  || '';
  if (navigator.share) {
    try {
      await navigator.share({ title, text: text ? `${title}\n\n${text}` : title });
    } catch(e) {
      if (e.name !== 'AbortError') showToast('SHARE FAILED');
    }
  } else {
    // Fallback: copy to clipboard
    try {
      await navigator.clipboard.writeText(text ? `${title}\n\n${text}` : title);
      showToast('COPIED TO CLIPBOARD');
    } catch(e) { showToast('SHARE NOT SUPPORTED'); }
  }
}
window.shareNote = shareNote;

async function retranscribe(i) {
  const note = state.notes[i];
  if (!note?.audioWebm) { showToast('No audio data'); return; }
  // Reconstruct audioChunks from base64
  const res = await fetch(note.audioWebm);
  const blob = await res.blob();
  audioChunks = [blob];
  recSeconds = 0;
  await sendToGemini();
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

// ── DISTANCE CALC (Haversine, fully offline) ──────────────────
function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── GOOGLE PLACES HOURS FETCH ─────────────────────────────────
// Uses Place Details endpoint with placeId — single targeted call, not a search.
const PLACES_API_KEY = 'AIzaSyAnAaV0OBrMSKX8Ie_Kl-IpIQh-6Th45nI';

async function fetchStoreHours(store) {
  // Check cache — valid for 30 minutes
  const cached = storeHoursCache[store.placeId];
  if (cached && (Date.now() - cached.fetched_at < 30 * 60 * 1000)) {
    return cached;
  }

  try {
    // Places API v1 — supports CORS natively, no proxy needed
    const url = `https://places.googleapis.com/v1/places/${store.placeId}?fields=currentOpeningHours,regularOpeningHours&key=${PLACES_API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();

    if (data.error) throw new Error(data.error.message || data.error.status);

    const oh = data.currentOpeningHours || data.regularOpeningHours || {};
    const result = {
      open_now: oh.openNow ?? null,
      weekday_text: oh.weekdayDescriptions ?? [],
      fetched_at: Date.now(),
    };
    storeHoursCache[store.placeId] = result;
    return result;
  } catch (e) {
    console.warn('Places API error for', store.name, e);
    return null;
  }
}

// ── KEYWORD MATCHING: cross-reference Gemini detected_stores with favourites ─
function matchDetectedStores(detectedNames) {
  detectedStoreIds.clear();
  if (!detectedNames?.length) return;

  detectedNames.forEach(name => {
    const lower = name.toLowerCase().trim();
    favoriteStores.forEach(store => {
      if (store.keywords.some(kw => lower.includes(kw) || kw.includes(lower))) {
        detectedStoreIds.add(store.id);
      }
    });
  });
}

// ── RENDER STORES TAB ─────────────────────────────────────────
function renderStores() {
  const el = document.getElementById('storesList');
  if (!el) return;

  updateLocateBtn();

  if (!favoriteStores.length) {
    el.innerHTML = `<div class="stores-empty">${escHtml(t('stores_empty')).replace('\n','<br>')}</div>`;
    return;
  }

  // Merge base + custom stores
  const existingIds = new Set(favoriteStores.map(s => s.placeId));
  const allStores = [...favoriteStores, ...customStores.filter(s => !existingIds.has(s.placeId))];

  // Sort: favourites first, then detected, then by distance
  const sorted = [...allStores].sort((a, b) => {
    const aFav = favoriteStoreIds.has(a.placeId) ? 0 : 1;
    const bFav = favoriteStoreIds.has(b.placeId) ? 0 : 1;
    if (aFav !== bFav) return aFav - bFav;

    const aDetected = detectedStoreIds.has(a.id) ? 0 : 1;
    const bDetected = detectedStoreIds.has(b.id) ? 0 : 1;
    if (aDetected !== bDetected) return aDetected - bDetected;

    if (userLat !== null) {
      const dA = haversineKm(userLat, userLng, a.lat, a.lng);
      const dB = haversineKm(userLat, userLng, b.lat, b.lng);
      return dA - dB;
    }
    return 0;
  });

  // Find nearest store (for badge)
  let nearestId = null;
  if (userLat !== null && sorted.length) {
    nearestId = sorted.reduce((best, s) => {
      const dB = haversineKm(userLat, userLng, best.lat, best.lng);
      const dS = haversineKm(userLat, userLng, s.lat, s.lng);
      return dS < dB ? s : best;
    }).id;
  }

  el.innerHTML = sorted.map(store => {
    const isDetected = detectedStoreIds.has(store.id);
    const isNearest  = store.id === nearestId;
    const dist = userLat !== null
      ? haversineKm(userLat, userLng, store.lat, store.lng).toFixed(1)
      : null;

    const cached = storeHoursCache[store.placeId];

    function hoursHtml(c, id) {
      if (!c) return `<span class="store-hours-badge loading" ${id ? `id="hours-${id}"` : ''}>⏳ ${t('stores_hours_loading')}</span>`;
      const today = new Date().getDay(); // 0=Sun
      const todayText = c.weekday_text?.[(today + 6) % 7] || ''; // weekday_text is Mon-Sun
      const todayHours = todayText ? todayText.replace(/^[^:]+:\s*/,'') : '';
      if (c.open_now === true)  return `<span class="store-hours-badge open" ${id ? `id="hours-${id}"` : ''}>✓ ${t('stores_open')}${todayHours ? ' · ' + todayHours : ''}</span>`;
      if (c.open_now === false) return `<span class="store-hours-badge closed" ${id ? `id="hours-${id}"` : ''}>✗ ${t('stores_closed')}${todayHours ? ' · ' + todayHours : ''}</span>`;
      return `<span class="store-hours-badge loading" ${id ? `id="hours-${id}"` : ''}>${t('stores_hours_unavail')}</span>`;
    }

    let hoursBadge = cached === undefined
      ? `<span class="store-hours-badge loading" id="hours-${store.id}">⏳ ${t('stores_hours_loading')}</span>`
      : hoursHtml(cached, store.id);

    const distBadge = dist !== null
      ? `<span class="store-distance-badge ${isNearest ? 'nearest' : ''}">
           ${isNearest ? '★ ' + t('stores_nearest') + ' · ' : ''}${dist} ${t('stores_km')}
         </span>`
      : '';

    // Use lat,lng directly — most reliable, opens exact pin on all devices
    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${store.lat},${store.lng}&query_place_id=${store.placeId}`;
    const wazeUrl = `https://waze.com/ul?ll=${store.lat},${store.lng}&navigate=yes`;

    const isFav = favoriteStoreIds.has(store.placeId);
    const isCustom = store.custom === true;

    return `
      <div class="store-card ${isDetected ? 'detected' : ''}">
        <div class="store-detected-ribbon">${t('stores_detected_ribbon')}</div>
        <div class="store-card-body">
          <div class="store-icon-zone" onclick="toggleFav('${store.placeId}')" style="cursor:pointer;" title="Favourite">
            ${isFav ? '⭐' : store.emoji}
          </div>
          <div class="store-info">
            <div class="store-name">${escHtml(store.name)}</div>
            <div class="store-address">${escHtml(store.address)}</div>
            <div class="store-meta">
              ${distBadge}
              ${hoursBadge}
            </div>
          </div>
          <div class="store-actions">
            <a class="store-map-btn" href="${mapsUrl}" target="_blank" rel="noopener">
              <span class="store-map-icon">🗺️</span>
              <span>MAP</span>
            </a>
            <a class="store-map-btn" href="${wazeUrl}" target="_blank" rel="noopener" style="border-top:var(--border);">
              <span class="store-map-icon">🚗</span>
              <span>WAZE</span>
            </a>
            ${store.phone ? `<a class="store-map-btn store-call-btn" href="tel:${store.phone}" style="border-top:var(--border);">
              <span class="store-map-icon">📞</span>
              <span>CALL</span>
            </a>` : ''}
          </div>
        </div>
        <div class="store-expand-row" style="display:flex;gap:0;">
          <button class="store-expand-btn" style="flex:1;" onclick="event.stopPropagation();expandBranches('${escHtml(store.name)}')">
            📍 ${t('stores_expand_branches')}
          </button>
          ${isCustom ? `<button class="store-expand-btn" style="color:var(--red,#c0392b);border-left:var(--border);" onclick="removeCustomStore('${store.id}')">🗑️ REMOVE</button>` : ''}
        </div>
      </div>`;
  }).join('');

  // Kick off Places API fetches for any store not yet cached
  sorted.forEach(store => {
    if (storeHoursCache[store.placeId] === undefined) {
      storeHoursCache[store.placeId] = null; // mark as in-flight
      fetchStoreHours(store).then(result => {
        storeHoursCache[store.placeId] = result;
        const badge = document.getElementById(`hours-${store.id}`);
        if (badge) {
          const today = new Date().getDay();
          const todayText = result?.weekday_text?.[(today + 6) % 7] || '';
          const todayHours = todayText ? todayText.replace(/^[^:]+:\s*/,'') : '';
          if (!result) {
            badge.outerHTML = `<span class="store-hours-badge loading">${t('stores_hours_unavail')}</span>`;
          } else if (result.open_now === true) {
            badge.outerHTML = `<span class="store-hours-badge open">✓ ${t('stores_open')}${todayHours ? ' · ' + todayHours : ''}</span>`;
          } else if (result.open_now === false) {
            badge.outerHTML = `<span class="store-hours-badge closed">✗ ${t('stores_closed')}${todayHours ? ' · ' + todayHours : ''}</span>`;
          } else {
            badge.outerHTML = `<span class="store-hours-badge loading">${t('stores_hours_unavail')}</span>`;
          }
        }
      });
    }
  });
}

      const phone = (p.internationalPhoneNumber || '').replace(/\s/g, '').replace(/[()]/g, '') || null;
      favoriteStores.push({
        id: p.id, name: p.displayName?.text || storeName, emoji: '📍',
        address: p.formattedAddress || '', placeId: p.id,
        lat: p.location?.latitude || userLat, lng: p.location?.longitude || userLng,
        phone,
        keywords: [storeName.toLowerCase()]
      });
      detectedStoreIds.add(p.id);
    });
    renderStores();
    showToast('+' + newBranches.length + ' LOCATIONS FOUND');
  } catch(err) { console.error(err); showToast('SEARCH ERROR: ' + err.message?.slice(0,60)); }
}

window._bringDocs  = [];
